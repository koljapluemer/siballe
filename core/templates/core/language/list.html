{% extends "base.html" %}

{% block title %}Languages{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-2xl font-bold">Languages</h1>
  <a href="{% url 'core:language_create' %}" class="btn btn-primary btn-sm">New</a>
</div>

<div class="overflow-x-auto">
  <table class="table table-zebra w-full">
    <thead>
      <tr>
        <th>Code</th>
        <th>Name</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for obj in languages %}
      <tr>
        <td><span class="badge badge-outline font-mono">{{ obj.iso3 }}</span></td>
        <td>{{ obj.name }}</td>
        <td class="text-right whitespace-nowrap">
          <a href="{% url 'core:language_detail' obj.pk %}" class="btn btn-xs btn-ghost">View</a>
          <a href="{% url 'core:language_update' obj.pk %}" class="btn btn-xs btn-ghost">Edit</a>
          <a href="{% url 'core:language_delete' obj.pk %}" class="btn btn-xs btn-ghost text-error">Delete</a>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="3" class="text-center text-base-content/50 py-8">No languages yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
